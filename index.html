<!DOCTYPE html>
<html>
<head>
  <title>Abigail Hair Glamour</title>
  <style>
    body {
      font-family: Arial;
      background: #fff0f5;
      text-align: center;
    }
    h1 {
      color: #d63384;
    }
    form {
      background: white;
      padding: 20px;
      margin: auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
    input, button {
      width: 90%;
      padding: 10px;
      margin: 5px;
    }
    button {
      background: #d63384;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<h1>Abigail Hair Glamour</h1>
<p>Book your appointment</p>

<form>
  <input type="text" placeholder="Your Name" required><br>
  <input type="date" required><br>
  <input type="time" required><br>
  <button type="submit">Book Now</button>
</form>

</body>
</html>
